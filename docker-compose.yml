# Локальная инфраструктура для разработки AVAStudio (Фаза 1).
# Postgres поднимается командой: pnpm db:up
services:
  postgres:
    image: postgres:15-alpine
    container_name: avastudio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: avastudio
      POSTGRES_PASSWORD: avastudio
      POSTGRES_DB: avastudio
    ports:
      - "5432:5432"
    volumes:
      - avastudio-pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avastudio -d avastudio"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: avastudio-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - avastudio-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Jaeger all-in-one — локальная визуализация distributed tracing (TASK 8.2).
  # UI: http://localhost:16686 · приём OTLP/HTTP: 4318, OTLP/gRPC: 4317.
  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: avastudio-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:14269/"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Веб-UI для БД (опционально): pnpm db:up:tools
  adminer:
    image: adminer:4
    container_name: avastudio-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["tools"]

volumes:
  avastudio-pgdata:
  avastudio-redisdata:
