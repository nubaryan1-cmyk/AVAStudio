# Fly.io конфиг CPU-воркеров AVAStudio (TASK 18.3). Браузерный пул — отдельное
# приложение с тем же образом, но большим RAM (fly.browser.toml по аналогии).
app = "avastudio-worker-cpu"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  WORKER_CONCURRENCY = "2"

# Health-сервер воркера (/health, /metrics) на 4001.
[[services]]
  internal_port = 4001
  protocol = "tcp"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "get"
    path = "/health"

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"

# Масштабирование по глубине очереди — внешним скейлером (infrastructure/scale-workers.mjs),
# который дёргает Fly Machines API. min=1 держит «тёплую» машину, auto_stop усыпляет лишние.
